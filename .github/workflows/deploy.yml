name: Deploy to GitHub Pages

# Builds the standalone WASM app and publishes it to GitHub Pages.
#
# DISABLED on push: Pages requires the repo to be public (free plan) or a paid
# plan. Until then this is manual-only via workflow_dispatch. To activate:
#   1. Make the repo public (Settings → General → Danger Zone → Change visibility)
#   2. Ensure Pages is enabled: Settings → Pages → Build and deployment → Source: GitHub Actions
#   3. Re-add `push: branches: [master]` to the `on:` block below.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build:wasm
        working-directory: ui
      - run: npm run build
        working-directory: ui
        env:
          VITE_BASE: /chronos/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ui/dist

  deploy:
    name: Deploy site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
